services:
  minio:
    image: minio/minio:latest
    container_name: falkordb-browser-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    container_name: falkordb-browser-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      set -e;
      until mc alias set local http://minio:9000 minioadmin minioadmin; do
        sleep 1;
      done;
      mc mb --ignore-existing local/falkordb-csv-temp;
      mc anonymous set private local/falkordb-csv-temp;
      "
    restart: "no"

volumes:
  minio-data:
