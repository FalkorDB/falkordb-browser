name: Smoke Docker Tests

permissions:
  contents: read
  actions: read

on:
  push:
    branches: [ main, staging ]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE.txt'
      - 'helm/**'
      - '.github/workflows/helm-chart.yml'
      - '.github/dependabot.yml'
  pull_request:
    branches: [ main, staging ]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE.txt'
      - 'helm/**'
      - '.github/workflows/helm-chart.yml'
      - '.github/dependabot.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY || 'a3f5d8c2b7e4f1a0c9d6e8b2f5a7c3d1e9f2a4b8c6d3e7f1a5b9c2d8e4f0a6b3' }}

jobs:
  smoke-docker:
    name: Smoke tests against local docker build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Playwright dependencies
        run: |
          npm ci --prefer-offline --no-audit --progress=false --loglevel=error
          npx playwright install --with-deps chromium

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build local browser docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: falkordb-browser:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start FalkorDB core container
        run: |
          docker run -d --name falkordb-core --network host \
            -e "REDIS_ARGS=--protected-mode no" \
            falkordb/falkordb:latest

      - name: Start locally-built browser container
        run: |
          docker run -d --name falkordb-browser --network host \
            -e NEXTAUTH_URL=http://localhost:3000/ \
            -e NEXTAUTH_SECRET=SECRET \
            -e ENCRYPTION_KEY="$ENCRYPTION_KEY" \
            falkordb-browser:smoke

      - name: Wait for browser container to be ready
        run: |
          echo "Waiting for browser container to serve on :3000..."
          timeout 90s bash -c 'while !</dev/tcp/localhost/3000; do sleep 1; done'
          echo "Waiting for FalkorDB core to accept connections on :6379..."
          timeout 60s bash -c 'while !</dev/tcp/localhost/6379; do sleep 1; done'

      - name: Run smoke Playwright tests against local docker build
        run: |
          npx playwright test \
            --project="[Smoke] - Chromium" \
            --workers=1 \
            --reporter=dot,list

      - name: Collect container logs
        if: always()
        run: |
          mkdir -p docker-logs
          docker logs falkordb-browser > docker-logs/falkordb-browser.log 2>&1 || true
          docker logs falkordb-core > docker-logs/falkordb-core.log 2>&1 || true

      - name: Stop and remove containers
        if: always()
        run: |
          docker stop falkordb-browser falkordb-core || true
          docker rm falkordb-browser falkordb-core || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: smoke-docker-results-${{ github.run_id }}
          path: test-results/
          retention-days: 3
          if-no-files-found: ignore

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: smoke-docker-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload container logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: smoke-docker-logs-${{ github.run_id }}
          path: docker-logs/
          retention-days: 3
          if-no-files-found: ignore
