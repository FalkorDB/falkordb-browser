version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "staging"

  - package-ecosystem: "npm" # See documentation for possible values
    directory: "/" # Location of package manifests
    schedule:
      interval: "weekly"
    target-branch: "staging"
    groups:
      npm-all:
        patterns:
          - "*"
    cooldown:
      default-days: 7
    ignore:
      # TypeScript 7.0 (native Go compiler) ships no JS Compiler API, which
      # Next.js relies on for `next build` type-checking, so the bump breaks
      # the build. Scoped to 7.0.x only: TypeScript 7.1 is expected to restore
      # the programmatic API, so allow Dependabot to propose 7.1+ when it lands.
      # See https://github.com/vercel/next.js/pull/95639
      - dependency-name: "typescript"
        versions: ["7.0.x"]

      # eslint-plugin-react (pulled in transitively by eslint-config-next) has no
      # ESLint 10 compatible release yet: its latest (7.37.x) peer-caps at
      # eslint ^9.7, and eslint 10 removed the context.getFilename()/ScopeManager
      # APIs the Next.js lint stack relies on, which crashes `npm run lint`. Stay
      # on the eslint 9.x maintenance line until eslint-config-next /
      # eslint-plugin-react / typescript-eslint support eslint 10.
      - dependency-name: "eslint"
        versions: [">=10.0.0"]

      # Monaco 0.56.x worker entrypoint changes are incompatible with this
      # Turbopack setup; keep Dependabot from reopening noisy bump PRs until
      # the worker-resolution migration is completed.
      - dependency-name: "monaco-editor"
        versions: ["0.56.x"]

